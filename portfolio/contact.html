<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact — Janice Gao</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav id="navbar">
        <a href="index.html" class="nav-logo">JG</a>
        <ul class="nav-links">
            <li><a href="about.html">About</a></li>
            <li><a href="portfolio.html">Portfolio</a></li>
            <li><a href="contact.html" class="active">Contact</a></li>
        </ul>
        <button class="nav-toggle" aria-label="Toggle menu">
            <span></span>
            <span></span>
            <span></span>
        </button>
    </nav>

    <main class="page-content">
        <div class="container">
            <div class="contact-layout">
                <div class="contact-info">
                    <h1 class="page-title">Contact</h1>
                    <p class="contact-intro">Please don't hesitate to reach out.</p>
                    <div class="contact-links">
                        <a href="mailto:janice.gao@outlook.com" class="contact-link">janice.gao@outlook.com</a>
                        <a href="https://www.linkedin.com/in/janice-gao-9715471b5/" target="_blank" rel="noopener" class="contact-link">LinkedIn</a>
                    </div>
                </div>
                <form class="contact-form" id="contact-form">
                    <div class="form-row">
                        <input type="text" name="firstName" placeholder="First Name" required>
                        <input type="text" name="lastName" placeholder="Last Name" required>
                    </div>
                    <input type="email" name="email" placeholder="Email" required>
                    <textarea name="message" placeholder="Message" rows="5" required></textarea>
                    <button type="submit" class="btn-text">Send Message</button>
                    <p class="form-success" id="form-success">Thank you for your message!</p>
                </form>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Janice Gao</p>
        </div>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
